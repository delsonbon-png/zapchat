name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BUBBLEWRAP_KEYSTORE_PASSWORD: zapchat123
      BUBBLEWRAP_KEY_PASSWORD: zapchat123
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Bubblewrap Environment
        run: |
          # Use yes "" to hit "Enter" on all installation prompts (JDK and Android SDK)
          # This step will download about 200MB of tools.
          yes "" | npx @bubblewrap/cli doctor

      - name: Build APK
        run: |
          # Now that tools are installed, we just need to provide the version info.
          # printf "1.0.0\n1\n" provides the Version Name and Version Code.
          printf "1.0.0\n1\n" | npx @bubblewrap/cli build --skipPwaValidation --signingKeyPath="./android.keystore" --signingKeyAlias="android"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zapchat-apk
          path: ./*.apk
