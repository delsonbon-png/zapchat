name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BUBBLEWRAP_KEYSTORE_PASSWORD: zapchat123
      BUBBLEWRAP_KEY_PASSWORD: zapchat123
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap Environment
        run: |
          mkdir -p ~/.bubblewrap
          # Use absolute paths for the GitHub runner
          echo "{\"jdkPath\":\"/usr/lib/jvm/temurin-17-jdk-amd64\",\"androidSdkPath\":\"/usr/local/lib/android/sdk\"}" > ~/.bubblewrap/config.json

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses --sdk_root=/usr/local/lib/android/sdk

      - name: Generate Temporary Signing Key
        run: |
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass zapchat123 -keypass zapchat123 -dname "CN=ZapChat, OU=Dev, O=ZapChat, L=Local, S=Dev, C=US"

      - name: Build APK
        run: |
          # Build with explicit versioning and skip PWA validation
          yes | bubblewrap update --appVersionName "1.0.0" --skipVersionUpgrade --skipPwaValidation
          yes | bubblewrap build --skipPwaValidation --signingKeyPath="./android.keystore" --signingKeyAlias="android"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zapchat-apk
          path: ./*.apk
