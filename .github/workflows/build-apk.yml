name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BUBBLEWRAP_KEYSTORE_PASSWORD: zapchat123
      BUBBLEWRAP_KEY_PASSWORD: zapchat123
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix Android SDK Structure
        run: |
          if [ ! -d "$ANDROID_HOME/tools" ]; then
            sudo ln -s $ANDROID_HOME/cmdline-tools/latest $ANDROID_HOME/tools
          fi

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json

      - name: Accept Android Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_HOME

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate Temporary Signing Key
        run: |
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass zapchat123 -keypass zapchat123 -dname "CN=ZapChat, OU=Dev, O=ZapChat, L=Local, S=Dev, C=US"

      - name: Generate Android Project
        run: |
          # Step 1: Run update to generate the Android project files (gradlew, etc.)
          # It asks for versionName and versionCode
          printf "1.0.0\n1\n" | bubblewrap update --skipPwaValidation

      - name: Build APK
        run: |
          # Step 2: Build the APK. Answer "no" to the regenerate prompt since
          # we just generated the project in the previous step.
          echo "no" | bubblewrap build --skipPwaValidation --signingKeyPath="./android.keystore" --signingKeyAlias="android"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zapchat-apk
          path: ./*.apk
