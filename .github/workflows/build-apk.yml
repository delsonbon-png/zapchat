name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BUBBLEWRAP_KEYSTORE_PASSWORD: zapchat123
      BUBBLEWRAP_KEY_PASSWORD: zapchat123
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix Android SDK Structure (Symlink)
        run: |
          # Bubblewrap expects a 'tools' directory which is legacy.
          # We symlink the modern 'cmdline-tools/latest' to 'tools' to satisfy it.
          sudo ln -s $ANDROID_HOME/cmdline-tools/latest $ANDROID_HOME/tools
          echo "Symlink created at $ANDROID_HOME/tools"

      - name: Configure Bubblewrap
        run: |
          # Install CLI temporarily to run updateConfig
          npm install -g @bubblewrap/cli
          # Use absolute paths and the newly created symlink path
          bubblewrap updateConfig --jdkPath="$JAVA_HOME" --androidSdkPath="$ANDROID_HOME"

      - name: Accept Android Licenses
        run: |
          # Use full path to sdkmanager
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_HOME

      - name: Generate Temporary Signing Key
        run: |
          # Create keystore
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass zapchat123 -keypass zapchat123 -dname "CN=ZapChat, OU=Dev, O=ZapChat, L=Local, S=Dev, C=US"

      - name: Build APK
        run: |
          # Inject version info and build
          printf "1.0.0\n1\n" | bubblewrap build --skipPwaValidation --signingKeyPath="./android.keystore" --signingKeyAlias="android"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zapchat-apk
          path: ./*.apk
