name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/googlechromelabs/bubblewrap:latest
    env:
      BUBBLEWRAP_KEYSTORE_PASSWORD: zapchat123
      BUBBLEWRAP_KEY_PASSWORD: zapchat123
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Temporary Signing Key
        run: |
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass zapchat123 -keypass zapchat123 -dname "CN=ZapChat, OU=Dev, O=ZapChat, L=Local, S=Dev, C=US"

      - name: Build APK
        run: |
          # 1. Use printf to inject the version details manually into the update wizard
          # This answers: Version Name (1.0.0) and Version Code (1)
          printf "1.0.0\n1\n" | bubblewrap update --skipPwaValidation
          
          # 2. Build the APK using the generated project files
          yes | bubblewrap build --skipPwaValidation --signingKeyPath="./android.keystore" --signingKeyAlias="android"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zapchat-apk
          path: ./*.apk
