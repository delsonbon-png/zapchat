name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap Environment
        run: |
          mkdir -p ~/.bubblewrap
          # Define paths for JDK and Android SDK in the GitHub Runner
          echo "{\"jdkPath\":\"${JAVA_HOME}\",\"androidSdkPath\":\"${ANDROID_SDK_ROOT}\"}" > ~/.bubblewrap/config.json
          echo "Bubblewrap environment configured."

      - name: Generate Temporary Signing Key
        run: |
          # Only generate if it doesn't exist (though it's a fresh runner)
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass zapchat123 -keypass zapchat123 -dname "CN=ZapChat, OU=Dev, O=ZapChat, L=Local, S=Dev, C=US"

      - name: Build APK
        run: |
          # Use 'yes' to bypass any remaining licenses/prompts and build/update
          yes | bubblewrap update
          yes | bubblewrap build --signingKeyPath="./android.keystore" --signingKeyAlias="android" --signingKeyPassword="zapchat123" --signingKeyStorePassword="zapchat123"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zapchat-apk
          path: ./*.apk
